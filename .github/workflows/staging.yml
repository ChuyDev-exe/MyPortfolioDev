# ============================================================
#  STAGING — Auto-deploy on any branch except main / master
# ============================================================
#
#  Trigger : push to ANY branch that is NOT main or master
#  Steps   : install → type-check → build → deploy to Netlify (draft)
#  Env     : staging  (no approval gate needed)
# ============================================================

name: 🚀 Staging Deploy

on:
  push:
    branches-ignore:
      - main
      - master

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.12.0"

jobs:
  # ── 1. Build & Type-check ──────────────────────────────────
  build:
    name: 🔨 Build — Astro + React
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      # Astro check = TypeScript + Astro type validation
      - name: 🔍 Type check (astro check)
        run: npx astro check

      - name: 🏗️ Build
        run: npx astro build
        env:
          # Expose any public env vars your site needs
          PUBLIC_SITE_URL: ${{ vars.STAGING_SITE_URL }}

      # Upload dist/ + .netlify/ so the deploy job can use them without rebuilding
      - name: 📦 Package build output
        run: tar -czf build-output.tar.gz dist/ .netlify/

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-staging-${{ github.sha }}
          path: build-output.tar.gz
          retention-days: 1

  # ── 2. Deploy to Netlify (staging / draft) ─────────────────
  deploy-staging:
    name: 🌐 Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: staging
      url: ${{ steps.netlify.outputs.deploy-url }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-staging-${{ github.sha }}
          path: .

      - name: 📦 Extract build output
        run: tar -xzf build-output.tar.gz

      - name: 🟢 Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install Netlify CLI
        run: npm install -g netlify-cli@26.0.1

      - name: 🚀 Deploy to Netlify (draft)
        id: netlify
        run: |
          OUTPUT=$(netlify deploy \
            --dir=dist \
            --functions=.netlify/v1/functions \
            --no-build \
            --site=${{ secrets.NETLIFY_STAGING_SITE_ID }} \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --message="Staging: ${{ github.ref_name }} @ ${{ github.sha }}" \
            --json)
          echo "deploy-url=$(echo $OUTPUT | jq -r '.deploy_url')" >> $GITHUB_OUTPUT
          echo "logs-url=$(echo $OUTPUT | jq -r '.logs')" >> $GITHUB_OUTPUT
          echo "## 🚀 Staging Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** $(echo $OUTPUT | jq -r '.deploy_url')" >> $GITHUB_STEP_SUMMARY

      - name: 🔗 Post deploy URL to commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: '${{ steps.netlify.outputs.deploy-url }}',
              description: 'Staging deploy live',
              context: 'deploy/staging'
            });
